name: temannakes
description: Aplikasi offline untuk tenaga kesehatan (nakes) di daerah terpencil.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  google_fonts: ^6.1.0
  url_launcher: ^6.2.5
  # Patient Form Module
  excel: ^4.0.6
  pdf: ^3.10.8
  printing: ^5.12.0
  open_file: ^3.3.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/database/temannakes.db
